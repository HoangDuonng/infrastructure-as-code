---
- name: Deploy External Secrets Operator
  hosts: masters
  remote_user: ubuntu
  become: false
  tasks:
    - name: Add External Secrets Helm repository
      shell: |
        helm repo add external-secrets https://charts.external-secrets.io
        helm repo update

    - name: Install External Secrets Operator
      shell: |
        helm upgrade --install external-secrets external-secrets/external-secrets \
          --namespace external-secrets \
          --create-namespace \
          --version 0.9.20 \
          --set installCRDs=true \
          --wait

    - name: Wait for External Secrets deployments to be ready
      shell: |
        kubectl rollout status deployment/external-secrets -n external-secrets --timeout=120s
        kubectl rollout status deployment/external-secrets-webhook -n external-secrets --timeout=120s
