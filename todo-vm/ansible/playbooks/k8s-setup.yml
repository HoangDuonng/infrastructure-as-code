---
- name: Prepare all Kubernetes nodes
  hosts: k8s_cluster
  become: true
  tasks:
    - name: Disable swap immediately
      command: swapoff -a
      changed_when: false

    - name: Disable swap in fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+.*)$'
        replace: '# \1'

    - name: Load overlay kernel module
      modprobe:
        name: overlay
        state: present

    - name: Load br_netfilter kernel module
      modprobe:
        name: br_netfilter
        state: present

    - name: Add overlay and br_netfilter modules to startup
      copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf

    - name: Set sysctl parameters for Kubernetes networking
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: yes
      loop:
        - { name: "net.bridge.bridge-nf-call-iptables", value: "1" }
        - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { name: "net.ipv4.ip_forward", value: "1" }

    - name: Install prerequisite packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Install containerd runtime
      apt:
        name: containerd
        state: present

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      changed_when: true

    - name: Configure containerd to use SystemdCgroup
      replace:
        path: /etc/containerd/config.toml
        regexp: "SystemdCgroup = false"
        replace: "SystemdCgroup = true"
      notify: Restart containerd

    - name: Create apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Kubernetes apt keyring
      get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: "0644"
        force: yes

    - name: Add Kubernetes apt repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v1.35/deb/ /"
        state: present
        filename: kubernetes

    - name: Install Kubernetes tools (kubelet, kubeadm, kubectl)
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: Pin Kubernetes packages versions
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

  handlers:
    - name: Restart containerd
      service:
        name: containerd
        state: restarted

- name: Bootstrap Kubernetes Master Node
  hosts: masters
  become: true
  tasks:
    - name: Check if Kubernetes control plane is already initialized
      stat:
        path: /etc/kubernetes/admin.conf
      register: k8s_init

    - name: Initialize Kubernetes cluster
      command: >
        kubeadm init
        --pod-network-cidr={{ pod_network_cidr }}
        --apiserver-advertise-address={{ private_ip }}
        --apiserver-cert-extra-sans={{ ansible_host }}
      when: not k8s_init.stat.exists
      register: kubeadm_output

    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy admin.conf to ubuntu user's kube config
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        owner: ubuntu
        group: ubuntu
        remote_src: yes

    - name: Check if Calico CNI is installed
      become: false
      shell: kubectl get installations.operator.tigera.io default
      register: calico_check
      failed_when: false
      changed_when: false

    - name: Install Calico CNI via Tigera Operator with VXLAN
      become: false
      shell: |
        kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.32.1/manifests/tigera-operator.yaml
        kubectl rollout status deployment/tigera-operator -n tigera-operator --timeout=120s
        kubectl wait --for=condition=Established crd/installations.operator.tigera.io --timeout=60s
        kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.32.1/manifests/custom-resources.yaml
        kubectl patch installation default --type=merge -p '{"spec":{"calicoNetwork":{"ipPools":[{"blockSize":26,"cidr":"192.168.0.0/16","encapsulation":"VXLAN","name":"default-ipv4-ippool","natOutgoing":"Enabled","nodeSelector":"all()"}]}}}'
      when: calico_check.rc != 0

    - name: Check if Local Path StorageClass is installed
      become: false
      shell: kubectl get storageclass local-path
      register: storageclass_check
      failed_when: false
      changed_when: false

    - name: Install Local Path StorageClass provisioner
      become: false
      shell: |
        kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.26/deploy/local-path-storage.yaml
        kubectl annotate storageclass local-path storageclass.kubernetes.io/is-default-class="true" --overwrite
      when: storageclass_check.rc != 0

    - name: Generate join command for workers
      command: kubeadm token create --print-join-command
      register: join_command_raw
      changed_when: false

    - name: Set join command as host variable
      set_fact:
        join_command: "{{ join_command_raw.stdout }}"

- name: Join Worker Nodes to Cluster
  hosts: workers
  become: true
  tasks:
    - name: Check if node is already part of the cluster
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_init

    - name: Join Kubernetes cluster
      command: "{{ hostvars['todo-master']['join_command'] }}"
      when: not kubelet_init.stat.exists
