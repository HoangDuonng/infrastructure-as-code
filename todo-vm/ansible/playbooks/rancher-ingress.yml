---
- name: Install Ingress Controller, Cert-Manager, and Rancher UI
  hosts: masters
  remote_user: ubuntu
  become: false
  tasks:
    - name: Check if Helm is installed
      shell: helm version
      register: helm_check
      failed_when: false
      changed_when: false

    - name: Download and install Helm if not present
      become: true
      shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: helm_check.rc != 0

    - name: Add Helm Repositories
      shell: |
        helm repo add jetstack https://charts.jetstack.io
        helm repo add rancher-stable https://releases.rancher.com/server-charts/stable
        helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
        helm repo update

    - name: Install Cert-Manager
      shell: |
        helm upgrade --install cert-manager jetstack/cert-manager \
          --namespace cert-manager \
          --create-namespace \
          --version {{ cert_manager_version }} \
          --set installCRDs=true \
          --wait

    - name: Create cattle-system namespace for Rancher
      shell: kubectl create namespace cattle-system
      failed_when: false

    - name: Install Rancher UI
      shell: |
        helm upgrade --install rancher rancher-stable/rancher \
          --namespace cattle-system \
          --set hostname={{ rancher_hostname }} \
          --set bootstrapPassword={{ rancher_bootstrap_password }} \
          --set replicas=1 \
          --version {{ rancher_version }} \
          --wait

    - name: Install Nginx Ingress Controller (hostNetwork DaemonSet mode)
      shell: |
        helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
          --namespace ingress-nginx \
          --create-namespace \
          --set controller.hostNetwork=true \
          --set controller.kind=DaemonSet \
          --set controller.dnsPolicy=ClusterFirstWithHostNet \
          --set controller.service.type=ClusterIP \
          --set controller.admissionWebhooks.enabled=false \
          --wait
